<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="Animated laboratory equipment banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0d1b2f"/>
      <stop offset="100%" stop-color="#14173a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="tubeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.75 0 1 0 0 0.45 0 0 1 0 0.95 0 0 0 0.8 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="260" rx="32" fill="url(#bg)"/>
  <g opacity="0.35">
    <circle cx="90" cy="46" r="2" fill="#f8fafc">
      <animate attributeName="opacity" values="0.1;0.85;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="58" r="2" fill="#e879f9">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="810" cy="176" r="2" fill="#22d3ee">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="176" cy="200" r="2" fill="#c084fc">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#glow)" transform="translate(128 138)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="3.4s" repeatCount="indefinite"/>
      <path d="M 18 0 L 42 0 L 42 86 Q 42 98 30 104 Q 18 98 18 86 Z" fill="none" stroke="url(#glass)" stroke-width="5" stroke-linejoin="round"/>
      <path d="M 24 28 L 36 28 L 36 78 Q 36 86 30 90 Q 24 86 24 78 Z" fill="url(#tubeFill)" opacity="0.95">
        <animate attributeName="height" values="50;62;50" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="36;24;36" dur="2.2s" repeatCount="indefinite"/>
      </path>
      <circle cx="30" cy="58" r="3" fill="#f8fafc" opacity="0.9">
        <animate attributeName="cy" values="58;22;58" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="70" r="2.4" fill="#22d3ee" opacity="0.9">
        <animate attributeName="cy" values="70;20;70" dur="1.9s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="1.9s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g filter="url(#glow)" transform="translate(352 152)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -14;0 0" dur="4s" begin="0.3s" repeatCount="indefinite"/>
      <path d="M 0 0 L 30 0 L 30 76 Q 30 95 15 108 Q 0 95 0 76 Z" fill="none" stroke="url(#glass)" stroke-width="5" stroke-linejoin="round"/>
      <path d="M 8 44 L 22 44 L 22 80 Q 22 88 15 92 Q 8 88 8 80 Z" fill="#c084fc" opacity="0.85">
        <animate attributeName="height" values="36;46;36" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="52;42;52" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <circle cx="15" cy="66" r="3" fill="#f8fafc" opacity="0.85">
        <animate attributeName="cy" values="66;24;66" dur="1.7s" begin="0.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="1.7s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="15" cy="76" r="2.2" fill="#22d3ee" opacity="0.85">
        <animate attributeName="cy" values="76;20;76" dur="2s" begin="0.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g filter="url(#glow)" transform="translate(612 114)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
      <rect x="0" y="48" width="76" height="11" rx="5.5" fill="url(#metal)" opacity="0.9"/>
      <rect x="28" y="10" width="20" height="46" rx="9" fill="none" stroke="#f8fafc" stroke-width="5"/>
      <rect x="36" y="0" width="4" height="10" rx="2" fill="#f8fafc"/>
      <circle cx="38" cy="28" r="8" fill="none" stroke="#22d3ee" stroke-width="4"/>
      <circle cx="58" cy="20" r="6" fill="#e879f9" opacity="0.9"/>
      <path d="M 0 76 Q 24 58 38 58 Q 52 58 76 76" fill="none" stroke="#c084fc" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>

  <g filter="url(#glow)" transform="translate(760 68)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -12;0 0" dur="4.4s" begin="0.1s" repeatCount="indefinite"/>
      <path d="M 0 84 L 10 18 L 26 18 L 36 84 Z" fill="none" stroke="#f8fafc" stroke-width="4" stroke-linejoin="round"/>
      <rect x="7" y="18" width="18" height="10" rx="3" fill="#22d3ee" opacity="0.95"/>
      <circle cx="18" cy="58" r="3" fill="#f8fafc" opacity="0.85">
        <animate attributeName="cy" values="58;22;58" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g opacity="0.5">
    <path d="M 80 210 C 190 178, 288 228, 396 204 S 602 204, 822 184" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="7 10"/>
    <path d="M 66 224 C 186 246, 298 186, 410 218 S 646 250, 840 216" fill="none" stroke="#e879f9" stroke-width="2" stroke-dasharray="6 12"/>
  </g>
</svg>
